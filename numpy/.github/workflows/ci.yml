name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate notebook files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          notebooks = [Path('array.ipynb'), Path('basic.ipynb')]
          for notebook in notebooks:
              with notebook.open('r', encoding='utf-8') as handle:
                  data = json.load(handle)
              if data.get('nbformat', 0) < 4:
                  raise SystemExit(f'{notebook} has an unsupported nbformat')
              print(f'Validated {notebook}')
          PY
